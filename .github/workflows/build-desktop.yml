name: Build Desktop Bundles

on:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            rustTargets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - name: macOS Intel
            platform: macos-latest
            rustTargets: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - name: Windows x64
            platform: windows-latest
            rustTargets: x86_64-pc-windows-msvc
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install pnpm
        run: npm install --global pnpm@10.30.3

      - name: Verify pnpm
        run: pnpm --version

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        uses: tauri-apps/tauri-action@v0.6.0
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          args: ${{ matrix.args }}
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: liberty-[platform]-[arch]-[bundle]
