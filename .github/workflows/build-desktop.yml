name: Build Desktop Bundles

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-latest
            rust_target: aarch64-apple-darwin
            artifact_name: liberty-macos-aarch64
          - name: macOS Intel
            os: macos-latest
            rust_target: x86_64-apple-darwin
            artifact_name: liberty-macos-x64
          - name: Windows x64
            os: windows-2022
            rust_target: x86_64-pc-windows-msvc
            artifact_name: liberty-windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Dependencies
        shell: bash
        run: |
          pnpm --version
          pnpm install --frozen-lockfile

      - name: Build Tauri Bundle
        shell: bash
        run: pnpm tauri build --target ${{ matrix.rust_target }}

      - name: Inspect Build Outputs
        if: always()
        shell: bash
        run: |
          find src-tauri/target -maxdepth 6 -type d -name bundle -print || true
          find src-tauri/target -maxdepth 8 -type f \( -name "*.app" -o -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.zip" \) -print || true

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/**/release/bundle/**
          if-no-files-found: error
