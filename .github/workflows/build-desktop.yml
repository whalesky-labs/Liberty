name: Build Desktop Bundles

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      create_release:
        description: "是否发布到 GitHub Release"
        required: false
        type: boolean
        default: false
      prerelease:
        description: "是否标记为预发布版本"
        required: false
        type: boolean
        default: false
      version_bump:
        description: "版本递增方式"
        required: false
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  prepare_release:
    name: Prepare Release Version
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.version.outputs.tag }}
      release_version: ${{ steps.version.outputs.version }}
      target_commit: ${{ steps.version.outputs.target_commit }}
      prerelease: ${{ steps.version.outputs.prerelease }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Resolve Version
        id: version
        shell: bash
        env:
          INPUT_CREATE_RELEASE: ${{ inputs.create_release }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          INPUT_VERSION_BUMP: ${{ inputs.version_bump }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
            echo "target_commit=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${INPUT_PRERELEASE:-false}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          current_version="$(node -p "require('./package.json').version")"
          next_version="${current_version}"

          if [[ "${INPUT_CREATE_RELEASE}" == "true" ]]; then
            latest_tag="$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"
            base_version="${current_version}"
            if [[ -n "${latest_tag}" ]]; then
              base_version="${latest_tag#v}"
            fi

            IFS='.' read -r major minor patch <<< "${base_version}"
            bump="${INPUT_VERSION_BUMP:-patch}"
            case "${bump}" in
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              *)
                patch=$((patch + 1))
                ;;
            esac

            next_version="${major}.${minor}.${patch}"

            NEXT_VERSION="${next_version}" node <<'NODE'
          const fs = require('fs');
          const version = process.env.NEXT_VERSION;

          const packageJsonPath = 'package.json';
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));
          packageJson.version = version;
          fs.writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, 2)}\n`);

          const tauriConfigPath = 'src-tauri/tauri.conf.json';
          const tauriConfig = JSON.parse(fs.readFileSync(tauriConfigPath, 'utf8'));
          tauriConfig.version = version;
          fs.writeFileSync(tauriConfigPath, `${JSON.stringify(tauriConfig, null, 2)}\n`);

          const cargoTomlPath = 'src-tauri/Cargo.toml';
          const cargoToml = fs.readFileSync(cargoTomlPath, 'utf8');
          fs.writeFileSync(
            cargoTomlPath,
            cargoToml.replace(/^version = ".*"$/m, `version = "${version}"`),
          );
          NODE

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
            git commit -m "chore: bump version to v${next_version}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
            target_commit="$(git rev-parse HEAD)"
          else
            target_commit="${GITHUB_SHA}"
          fi

          echo "tag=v${next_version}" >> "$GITHUB_OUTPUT"
          echo "version=${next_version}" >> "$GITHUB_OUTPUT"
          echo "target_commit=${target_commit}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${INPUT_PRERELEASE:-false}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.name }})
    needs: prepare_release
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      LIBERTY_RUNTIME_BUNDLE_READY: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-latest
            platform_id: darwin-aarch64
            rust_target: aarch64-apple-darwin
            artifact_name: liberty-macos-aarch64
            artifact_path: |
              src-tauri/target/**/release/bundle/dmg/*.dmg
              src-tauri/target/**/release/bundle/macos/*.app.tar.gz
          - name: macOS Intel
            os: macos-15-intel
            platform_id: darwin-x64
            rust_target: x86_64-apple-darwin
            artifact_name: liberty-macos-x64
            artifact_path: |
              src-tauri/target/**/release/bundle/dmg/*.dmg
              src-tauri/target/**/release/bundle/macos/*.app.tar.gz
          - name: Windows x64
            os: windows-2022
            platform_id: windows-x64
            rust_target: x86_64-pc-windows-msvc
            artifact_name: liberty-windows-x64
            artifact_path: |
              src-tauri/target/**/release/bundle/msi/*.msi
              src-tauri/target/**/release/bundle/nsis/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare_release.outputs.target_commit }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack PNPM
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.30.3 --activate
          pnpm --version

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Dependencies
        shell: bash
        run: |
          pnpm install --frozen-lockfile

      - name: Prepare Bundled Runtime
        shell: bash
        run: |
          python scripts/prepare_runtime_bundle.py \
            --platform-id "${{ matrix.platform_id }}" \
            --output-dir "runtime-bundles/${{ matrix.platform_id }}"

      - name: Build Tauri Bundle
        shell: bash
        run: pnpm tauri build --target ${{ matrix.rust_target }}

      - name: Inspect Build Outputs
        if: always()
        shell: bash
        run: |
          find runtime-bundles -maxdepth 3 -type f -print || true
          find src-tauri/target -maxdepth 6 -type d -name bundle -print || true
          find src-tauri/target -maxdepth 8 -type f \( -name "*.app" -o -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.zip" \) -print || true

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - prepare_release
      - build
    runs-on: ubuntu-latest
    if: >-
      ((github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) && github.actor != 'github-actions[bot]') ||
      (github.event_name == 'workflow_dispatch' && inputs.create_release)
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Build Artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-assets

      - name: Ensure Release Tag Exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
          TARGET_COMMIT: ${{ needs.prepare_release.outputs.target_commit }}
        run: |
          if ! git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/${RELEASE_TAG}" \
              -f sha="${TARGET_COMMIT}" >/dev/null
          fi

      - name: Prepare Release Assets
        id: assets
        shell: bash
        run: |
          mkdir -p release-upload

          while IFS= read -r -d '' file; do
            artifact_name="$(basename "$(dirname "${file}")")"
            file_name="$(basename "${file}")"
            cp "${file}" "release-upload/${artifact_name}-${file_name}"
          done < <(
            find release-assets -type f \
              \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.msi" -o -name "*.exe" \) \
              -print0
          )

          asset_count="$(find release-upload -type f | wc -l | tr -d ' ')"
          if [[ "${asset_count}" == "0" ]]; then
            echo "::error::下载的构建产物中未找到可发布文件。"
            exit 1
          fi

          find release-upload -maxdepth 1 -type f -print | sort
          echo "count=${asset_count}" >> "$GITHUB_OUTPUT"

      - name: Generate Release Notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
          TARGET_COMMIT: ${{ needs.prepare_release.outputs.target_commit }}
        run: |
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${RELEASE_TAG}" \
            -f target_commitish="${TARGET_COMMIT}" \
            --jq ".body" > release-notes.md

      - name: Publish Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
          PRERELEASE: ${{ needs.prepare_release.outputs.prerelease }}
        run: |
          mapfile -t assets < <(find release-upload -maxdepth 1 -type f | sort)

          release_args=(
            --title "Liberty ${RELEASE_TAG}"
            --notes-file release-notes.md
            --verify-tag
          )

          if [[ "${PRERELEASE}" == "true" ]]; then
            release_args+=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" --jq ".id")"
            python3 - <<'PY'
          import json
          import os

          with open("release-notes.md", encoding="utf-8") as release_notes:
              body = release_notes.read()

          payload = {
              "name": f"Liberty {os.environ['RELEASE_TAG']}",
              "body": body,
              "prerelease": os.environ.get("PRERELEASE") == "true",
          }

          with open("release-update.json", "w", encoding="utf-8") as release_update:
              json.dump(payload, release_update)
          PY
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              --input release-update.json >/dev/null
            gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${assets[@]}" "${release_args[@]}"
          fi
