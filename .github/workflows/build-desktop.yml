name: Build Desktop Bundles

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-latest
            platform_id: darwin-aarch64
            rust_target: aarch64-apple-darwin
            artifact_name: liberty-macos-aarch64
            artifact_path: |
              src-tauri/target/**/release/bundle/dmg/*.dmg
              src-tauri/target/**/release/bundle/macos/*.app.tar.gz
          - name: macOS Intel
            os: macos-15-intel
            platform_id: darwin-x64
            rust_target: x86_64-apple-darwin
            artifact_name: liberty-macos-x64
            artifact_path: |
              src-tauri/target/**/release/bundle/dmg/*.dmg
              src-tauri/target/**/release/bundle/macos/*.app.tar.gz
          - name: Windows x64
            os: windows-2022
            platform_id: windows-x64
            rust_target: x86_64-pc-windows-msvc
            artifact_name: liberty-windows-x64
            artifact_path: |
              src-tauri/target/**/release/bundle/msi/*.msi
              src-tauri/target/**/release/bundle/nsis/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack PNPM
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.30.3 --activate
          pnpm --version

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Dependencies
        shell: bash
        run: |
          pnpm install --frozen-lockfile

      - name: Prepare Bundled Runtime
        shell: bash
        run: |
          python scripts/prepare_runtime_bundle.py \
            --platform-id "${{ matrix.platform_id }}" \
            --output-dir "runtime-bundles/${{ matrix.platform_id }}"

      - name: Build Tauri Bundle
        shell: bash
        run: pnpm tauri build --target ${{ matrix.rust_target }}

      - name: Inspect Build Outputs
        if: always()
        shell: bash
        run: |
          find runtime-bundles -maxdepth 3 -type f -print || true
          find src-tauri/target -maxdepth 6 -type d -name bundle -print || true
          find src-tauri/target -maxdepth 8 -type f \( -name "*.app" -o -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.zip" \) -print || true

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
